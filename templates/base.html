<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{page_title}</title>
  <meta name="description" content="{meta_description}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 0; line-height: 1.5; }
    header, footer { padding: 16px 24px; background:#0f172a; color:#f9fafb; }
    main { padding: 24px; max-width: 800px; margin: 0 auto; }
    a { color:#2563eb; text-decoration:none; }
    a:hover { text-decoration:underline; }
    table { border-collapse: collapse; width: 100%; margin: 16px 0; }
    th, td { border:1px solid #e5e7eb; padding:8px; text-align:left; }
    h1 { font-size: 1.9rem; margin-bottom: 0.5rem; }
    h2 { margin-top: 2rem; }
    .tag { display:inline-block; background:#e0f2fe; color:#0369a1; padding:2px 8px; border-radius:9999px; font-size:12px; margin-bottom:8px;}
    .cta { display:inline-block; margin-top:12px; padding:10px 16px; background:#2563eb; color:#fff; border-radius:6px; font-weight:600; }
    .cta:hover { background:#1d4ed8; }
    .faq-item { margin-bottom: 12px; }
    .faq-item h3 { margin-bottom:4px; font-size:1rem; }
    .small { font-size: 0.85rem; color:#6b7280; }
  </style>
</head>
<body>
  <header>
    <div><strong>spending.college</strong> – College Money Tools</div>
  </header>
  <main>
    {content}
  </main>
  <footer>
    <div class="small">
      Generated locally by your spending.college content generator. Edit <code>locations.csv</code> and re-run <code>python generate.py</code> to update pages.
    </div>
  </footer>
</body>
</html>
